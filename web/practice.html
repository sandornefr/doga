<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyakorló – WEB dolgozat</title>
  <link rel="icon" href="../kando_favion_dark.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="../kando_favion_light.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --bg2:      #111827;
      --bg3:      #1e293b;
      --border:   #1f2937;
      --accent:   #22c55e;
      --accent2:  #16a34a;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --blue:     #3b82f6;
      --blue2:    #1d4ed8;
      --red:      #ef4444;
      --font:     'Segoe UI', system-ui, sans-serif;
      --topbar-h: 54px;
      --bottom-h: 52px;
      --left-w:   280px;
      --right-w:  calc(50% - 140px);
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* ===== TOPBAR ===== */
    .topbar {
      height: var(--topbar-h);
      background: var(--bg2);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-logo { height: 30px; margin-right: 8px; }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 8px;
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); font-size: 0.82rem; cursor: pointer;
      text-decoration: none; white-space: nowrap;
      transition: border-color .2s, color .2s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }

    .pills-wrapper {
      display: flex; align-items: center; gap: 5px;
      overflow-x: auto; flex: 1; padding: 4px 0;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .pill {
      flex-shrink: 0; width: 32px; height: 28px;
      border-radius: 6px; border: 1.5px solid #374151;
      background: transparent; color: var(--muted);
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: all .18s; display: flex; align-items: center; justify-content: center;
    }
    .pill:hover { border-color: var(--blue); color: #93c5fd; }
    .pill.active { border-color: var(--blue); background: rgba(59,130,246,.15); color: #93c5fd; }
    .pill.done { border-color: var(--accent); background: var(--accent); color: #052e16; font-weight: 700; }
    .pill.done::after { content: '✓'; margin-left: 1px; }

    .progress-label {
      white-space: nowrap; font-size: 0.78rem; color: var(--muted);
      padding: 0 8px; border-left: 1.5px solid var(--border);
    }
    .progress-label span { color: var(--accent); font-weight: 700; }

    .btn-ref-toggle {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 16px; border-radius: 8px;
      background: var(--accent); border: 1.5px solid var(--accent);
      color: #052e16; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      white-space: nowrap; transition: all .2s; flex-shrink: 0;
    }
    .btn-ref-toggle:hover { background: var(--accent2); border-color: var(--accent2); }

    /* ===== MAIN LAYOUT ===== */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - var(--topbar-h) - var(--bottom-h));
    }

    /* ===== LEFT PANEL ===== */
    .left-panel {
      width: var(--left-w);
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .left-panel-inner {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .task-title {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
      line-height: 1.3;
    }
    .task-desc {
      font-size: 0.85rem; color: var(--muted); line-height: 1.6;
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .checklist-title {
      font-size: 0.75rem; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 10px; border-radius: 7px;
      margin-bottom: 6px; background: var(--bg3);
      border: 1px solid var(--border); font-size: 0.82rem;
      transition: border-color .2s;
    }
    .check-item.pass { border-color: rgba(34,197,94,.4); }
    .check-item.fail { border-color: rgba(239,68,68,.3); }
    .check-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .check-text { color: var(--text); line-height: 1.4; }
    .check-exp {
      font-size: 0.77rem; color: var(--muted); margin-top: 4px;
      line-height: 1.5; display: none;
    }
    .check-exp.visible { display: block; }

    /* Hint button */
    .btn-hint {
      margin-top: 4px;
      padding: 2px 10px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      color: #93c5fd;
      font-size: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-hint:hover { background: #1d4ed8; color: #fff; }
    .btn-insert-snippet {
      margin-top: 6px;
      padding: 4px 12px;
      background: #14532d;
      border: 1px solid #22c55e;
      border-radius: 6px;
      color: #86efac;
      font-size: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: monospace;
      word-break: break-all;
      white-space: normal;
      text-align: left;
      line-height: 1.4;
    }
    .btn-insert-snippet:hover { background: #166534; color: #fff; }

    /* Solution button */
    .btn-solution {
      padding: 6px 14px;
      background: #3b1f00;
      border: 1.5px solid #f59e0b;
      border-radius: 8px;
      color: #fcd34d;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
    }
    .btn-solution:hover { background: #92400e; }

    .success-banner {
      display: none; margin-top: 12px;
      background: rgba(34,197,94,.12); border: 1.5px solid rgba(34,197,94,.4);
      border-radius: 10px; padding: 12px 14px; text-align: center;
      font-size: 0.88rem; color: var(--accent); font-weight: 600;
    }
    .success-banner.visible { display: block; }

    /* ===== CENTER PANEL (EDITORS) ===== */
    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .editor-tabs {
      display: flex;
      background: var(--bg3);
      border-bottom: 1.5px solid var(--border);
      padding: 0 8px;
    }
    .tab-btn {
      padding: 10px 18px; border: none; background: transparent;
      color: var(--muted); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border-bottom: 2.5px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .editor-area { flex: 1; position: relative; overflow: hidden; }
    .editor-wrap {
      position: absolute; inset: 0;
      display: none;
    }
    .editor-wrap.active { display: block; }

    /* ===== RIGHT PANEL (PREVIEW) ===== */
    .right-panel {
      width: var(--right-w);
      flex-shrink: 0;
      border-left: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .preview-header {
      padding: 8px 14px;
      background: var(--bg3);
      border-bottom: 1.5px solid var(--border);
      font-size: 0.78rem; font-weight: 600;
      color: var(--muted); letter-spacing: .06em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    .preview-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #preview-frame {
      flex: 1; width: 100%; border: none; background: #fff;
    }

    /* ===== BOTTOM BAR ===== */
    .bottom-bar {
      height: var(--bottom-h);
      background: var(--bg2);
      border-top: 1.5px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 14px;
      flex-shrink: 0;
    }
    .btn-check {
      padding: 9px 22px; border-radius: 9px;
      background: var(--accent2); border: 1.5px solid var(--accent);
      color: #fff; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: background .18s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-check:hover { background: var(--accent); }
    .score-display {
      font-size: 0.88rem; color: var(--muted);
    }
    .score-display span { color: var(--text); font-weight: 700; }
    .btn-next {
      margin-left: auto;
      padding: 9px 18px; border-radius: 9px;
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all .18s;
      display: flex; align-items: center; gap: 7px;
    }
    .btn-next:hover { border-color: var(--blue); color: #93c5fd; }
    .btn-reset {
      padding: 9px 14px; border-radius: 9px;
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); font-size: 0.85rem;
      cursor: pointer; transition: all .18s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-reset:hover { border-color: var(--red); color: #fca5a5; }

    /* ===== REFERENCE PANEL ===== */
    .ref-overlay {
      position: fixed; inset: 0; z-index: 199;
      background: rgba(0,0,0,.5);
      display: none;
    }
    .ref-overlay.open { display: block; }
    .ref-panel {
      position: fixed; top: 0; right: -380px; bottom: 0;
      width: 370px; z-index: 200;
      background: var(--bg2);
      border-left: 1.5px solid var(--border);
      display: flex; flex-direction: column;
      transition: right .28s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .ref-panel.open { right: 0; }
    .ref-header {
      padding: 14px 16px;
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-weight: 700; font-size: 1.05rem;
    }
    .btn-close-ref {
      background: transparent; border: none;
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
      padding: 4px 8px; border-radius: 5px;
      transition: color .15s;
    }
    .btn-close-ref:hover { color: var(--text); }
    .ref-body {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .ref-section {
      border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 8px; overflow: hidden;
    }
    .ref-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; background: var(--bg3);
      cursor: pointer; font-size: 0.84rem; font-weight: 600;
      user-select: none; transition: background .15s;
    }
    .ref-section-header:hover { background: #243044; }
    .ref-section-header .chevron {
      transition: transform .2s; font-size: 0.75rem; color: var(--muted);
    }
    .ref-section.open .chevron { transform: rotate(90deg); }
    .ref-section-body {
      display: none; padding: 10px;
      background: var(--bg); position: relative;
    }
    .ref-section.open .ref-section-body { display: block; }
    .ref-code {
      font-family: 'Consolas', monospace; font-size: 0.78rem;
      color: #a3e635; background: #020617;
      border-radius: 6px; padding: 10px 12px;
      white-space: pre-wrap; word-break: break-all;
      margin-bottom: 6px; border: 1px solid #0f1f3a;
    }
    .btn-copy {
      padding: 4px 10px; border-radius: 5px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.75rem;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all .15s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { color: var(--accent); border-color: var(--accent); }

    /* ===== CONFETTI FLASH ===== */
    .confetti-flash {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      opacity: 0;
      animation: none;
    }
    .confetti-flash.animate {
      animation: confettiPop .7s ease-out forwards;
    }
    @keyframes confettiPop {
      0%   { opacity: 0; transform: scale(.5); }
      30%  { opacity: 1; transform: scale(1.2); }
      70%  { opacity: .8; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.1); }
    }

    /* scrollbar global */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

function initStreak() {
  const today = new Date().toISOString().split('T')[0];
  let data = JSON.parse(localStorage.getItem('practice_streak') || '{"date":"","streak":0}');
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (data.date === today) {
    // already today, keep
  } else if (data.date === yesterday) {
    data.streak += 1;
    data.date = today;
  } else {
    data.streak = 1;
    data.date = today;
  }
  localStorage.setItem('practice_streak', JSON.stringify(data));
  const el = document.getElementById('streak-counter');
  if (el) el.textContent = '🔥 ' + data.streak + ' nap';
}
initStreak();

// =====================================================================
// PILLS
// =====================================================================

function buildPills() {
  const wrapper = document.getElementById('pills-wrapper');
  wrapper.innerHTML = '';
  tasks.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (i === 0 ? ' active' : '');
    btn.textContent = t.id;
    btn.title = t.emoji + ' ' + t.title;
    btn.onclick = () => switchTask(i);
    btn.id = 'pill-' + i;
    wrapper.appendChild(btn);
  });
}

function updatePills() {
  tasks.forEach((t, i) => {
    const pill = document.getElementById('pill-' + i);
    if (!pill) return;
    pill.className = 'pill';
    if (i === state.currentTask) pill.classList.add('active');
    if (state.taskStatus[i] === 'done') pill.classList.add('done');
    else if (state.taskStatus[i] === 'started') pill.classList.add('started');
  });
  const done = state.taskStatus.filter(s => s === 'done').length;
  document.getElementById('progress-count').textContent = done;
}

// =====================================================================
// TASK LOADING
// =====================================================================

function saveCurrentEditors() {
  const i = state.currentTask;
  if (!state.editors.html) return;
  sessionStorage.setItem('practice_task_' + i + '_html', state.editors.html.getValue());
  sessionStorage.setItem('practice_task_' + i + '_css', state.editors.css.getValue());
}

function loadTask(index) {
  // Reset per-task UI state
  if (!state.hintShown[index]) state.hintShown[index] = new Set();
  const solBtn = document.getElementById('btn-solution');
  if (solBtn) solBtn.style.display = 'none';

  saveCurrentEditors();
  state.currentTask = index;
  const task = tasks[index];

  const savedHtml = sessionStorage.getItem('practice_task_' + index + '_html');
  const savedCss  = sessionStorage.getItem('practice_task_' + index + '_css');

  const htmlVal = (savedHtml !== null) ? savedHtml : task.starterHtml;
  const cssVal  = (savedCss  !== null) ? savedCss  : task.starterCss;

  state.editors.html.setValue(htmlVal);
  state.editors.css.setValue(cssVal);

  document.getElementById('task-title').textContent = task.emoji + ' ' + task.id + '. ' + task.title;
  document.getElementById('task-desc').innerHTML = task.description;

  // Mark as started if idle
  if (state.taskStatus[index] === 'idle') state.taskStatus[index] = 'started';

  renderChecklist(null);
  document.getElementById('score-display').textContent = '–';
  updatePills();
  updatePreview();

  // switch to HTML tab
  switchTab('html');
}

function switchTask(index) {
  if (index === state.currentTask) return;
  loadTask(index);
}

function goNext() {
  if (state.currentTask < tasks.length - 1) {
    switchTask(state.currentTask + 1);
  }
}

function resetTask() {
  const i = state.currentTask;
  sessionStorage.removeItem('practice_task_' + i + '_html');
  sessionStorage.removeItem('practice_task_' + i + '_css');
  const task = tasks[i];
  state.editors.html.setValue(task.starterHtml);
  state.editors.css.setValue(task.starterCss);
  renderChecklist(null);
  document.getElementById('score-display').textContent = '–';
  updatePreview();
}

// =====================================================================
// TABS
// =====================================================================

function switchTab(tab) {
  document.getElementById('wrap-html').classList.toggle('active', tab === 'html');
  document.getElementById('wrap-css').classList.toggle('active', tab === 'css');
  document.getElementById('tab-html').classList.toggle('active', tab === 'html');
  document.getElementById('tab-css').classList.toggle('active', tab === 'css');
}

// =====================================================================
// PREVIEW
// =====================================================================

function schedulePreview() {
  clearTimeout(state.previewTimeout);
  state.previewTimeout = setTimeout(updatePreview, 500);
}

function updatePreview() {
  if (!state.editors.html) return;
  let html = state.editors.html.getValue();
  const css = state.editors.css.getValue();

  // Helyi képek → picsum placeholder (hogy az előnézetben valódi képek legyenek)
  html = html.replace(/src=["']img\/([^"']+)["']/gi, (match, filename) => {
    const seed = filename.replace(/\.[^.]+$/, ''); // kiterjesztés nélküli név = seed
    const isHeader = /fejlec|header|banner/i.test(seed);
    const w = isHeader ? 900 : 400;
    const h = isHeader ? 220 : 280;
    return `src="https://picsum.photos/seed/${seed}/${w}/${h}"`;
  });

  if (css.trim()) {
    // CSS-ben is cseréljük a helyi képeket (pl. list-style-image, background)
    const patchedCss = css.replace(/url\(['"]?img\/([^'")\s]+)['"]?\)/gi, (match, filename) => {
      const seed = filename.replace(/\.[^.]+$/, '');
      return `url('https://picsum.photos/seed/${seed}/32/32')`;
    });
    html = html.replace('</head>', '<style>' + patchedCss + '</style>\n</head>');
    if (!html.includes('</head>')) html = '<style>' + patchedCss + '</style>\n' + html;
  }

  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
  runChecksLive();
}

// =====================================================================
// CHECKS
// =====================================================================

function insertSnippetHtml(snippet) {
  const editor = state.editors.html;
  if (!editor) return;
  const model = editor.getModel();
  const content = model.getValue();
  const headClose = content.toLowerCase().lastIndexOf('</head>');
  if (headClose >= 0) {
    // Beillesztés közvetlenül a </head> elé, új sorba
    const pos = model.getPositionAt(headClose);
    editor.executeEdits('snippet-insert', [{
      range: new window.monaco.Range(pos.lineNumber, 1, pos.lineNumber, 1),
      text: snippet + '\n',
    }]);
  } else {
    // Ha nincs </head>, a kurzor pozíciójára szúrjuk be
    editor.trigger('keyboard', 'type', { text: snippet });
  }
  editor.focus();
}

function runChecks() {
  const task = tasks[state.currentTask];
  const html = state.editors.html.getValue();
  const css  = state.editors.css.getValue();

  let doc;
  try {
    const parser = new DOMParser();
    doc = parser.parseFromString(html, 'text/html');
  } catch(e) {
    doc = document.implementation.createHTMLDocument('');
  }

  const results = task.checks.map(ch => {
    try { return !!ch.fn(html, css, doc); }
    catch(e) { return false; }
  });

  state.taskResults[state.currentTask] = results;

  const passed = results.filter(Boolean).length;
  const total  = results.length;
  const allPass = passed === total;

  if (!allPass) {
    state.failedAttempts[state.currentTask] = (state.failedAttempts[state.currentTask] || 0) + 1;
    if (state.failedAttempts[state.currentTask] >= 3) {
      const solBtn = document.getElementById('btn-solution');
      if (solBtn) solBtn.style.display = 'inline-flex';
    }
  }

  if (allPass && state.taskStatus[state.currentTask] !== 'done') {
    state.taskStatus[state.currentTask] = 'done';
    if (!state.completedOnce[state.currentTask]) {
      state.completedOnce[state.currentTask] = true;
      triggerConfetti();
    }
  } else if (!allPass) {
    if (state.taskStatus[state.currentTask] !== 'done') {
      state.taskStatus[state.currentTask] = 'started';
    }
  }

  renderChecklist(results);
  document.getElementById('score-display').innerHTML =
    '<span>' + passed + ' / ' + total + '</span> ellenőrzés teljesítve';

  updatePills();
}

function renderChecklist(results) {
  const task = tasks[state.currentTask];
  const taskIdx = state.currentTask;
  const list = document.getElementById('checklist');
  list.innerHTML = '';

  task.checks.forEach((ch, i) => {
    const res = results ? results[i] : null;
    const div = document.createElement('div');
    div.className = 'check-item' + (res === true ? ' pass' : res === false ? ' fail' : '');
    div.id = 'check-item-' + i;

    const icon = document.createElement('span');
    icon.className = 'check-icon';
    icon.id = 'check-icon-' + i;
    icon.textContent = res === true ? '✅' : res === false ? '❌' : '⬜';

    const textWrap = document.createElement('div');
    textWrap.style.flex = '1';
    const label = document.createElement('div');
    label.className = 'check-text';
    label.textContent = ch.label;

    textWrap.appendChild(label);

    // Show hint button for failed checks
    if (res === false) {
      const hintShownForThis = state.hintShown[taskIdx] && state.hintShown[taskIdx].has(i);
      if (!hintShownForThis) {
        const hintBtn = document.createElement('button');
        hintBtn.className = 'btn-hint';
        hintBtn.innerHTML = '💡 Tipp';
        hintBtn.onclick = () => {
          if (!state.hintShown[taskIdx]) state.hintShown[taskIdx] = new Set();
          state.hintShown[taskIdx].add(i);
          renderChecklist(state.taskResults[state.currentTask]);
        };
        textWrap.appendChild(hintBtn);
      } else {
        const exp = document.createElement('div');
        exp.className = 'check-exp visible';
        exp.innerHTML = ch.explanation;
        textWrap.appendChild(exp);

        if (ch.snippet) {
          const insBtn = document.createElement('button');
          insBtn.className = 'btn-insert-snippet';
          insBtn.title = 'Kattints a beillesztéshez';
          insBtn.innerHTML = '📋 ' + ch.snippet.trim();
          insBtn.onclick = () => insertSnippetHtml(ch.snippet);
          textWrap.appendChild(insBtn);
        }
      }
    }

    div.appendChild(icon);
    div.appendChild(textWrap);
    list.appendChild(div);
  });

  // Success banner
  const banner = document.getElementById('success-banner');
  if (results) {
    const passed = results.filter(Boolean).length;
    const total = results.length;
    if (passed === total) {
      banner.className = 'success-banner visible';
      banner.textContent = '🎉 Sikerült! ' + passed + '/' + total + ' ellenőrzés teljesítve';
    } else {
      banner.className = 'success-banner';
    }
  } else {
    banner.className = 'success-banner';
  }
}

// =====================================================================
// LIVE CHECKS (silent, no failedAttempts increment, no score-display)
// =====================================================================

function runChecksLive() {
  if (!state.editors.html) return;
  const task = tasks[state.currentTask];
  const html = state.editors.html.getValue();
  const css  = state.editors.css.getValue();
  let doc;
  try { doc = new DOMParser().parseFromString(html, 'text/html'); }
  catch(e) { doc = document.implementation.createHTMLDocument(''); }

  const results = task.checks.map(ch => {
    try { return !!ch.fn(html, css, doc); } catch(e) { return false; }
  });

  state.taskResults[state.currentTask] = results;
  const passed = results.filter(Boolean).length;
  const total  = results.length;
  const allPass = passed === total;

  if (allPass && state.taskStatus[state.currentTask] !== 'done') {
    state.taskStatus[state.currentTask] = 'done';
    if (!state.completedOnce[state.currentTask]) {
      state.completedOnce[state.currentTask] = true;
      triggerConfetti();
      document.getElementById('score-display').innerHTML =
        '<span style="color:#22c55e">🎉 ' + passed + ' / ' + total + '</span> – minden teljesítve!';
    }
  } else if (!allPass && state.taskStatus[state.currentTask] !== 'done') {
    state.taskStatus[state.currentTask] = state.taskStatus[state.currentTask] === 'idle' ? 'idle' : 'started';
  }

  // Update icons only (don't re-render full checklist)
  results.forEach((res, i) => {
    const iconEl = document.getElementById('check-icon-' + i);
    if (iconEl) iconEl.textContent = res ? '✅' : (state.taskResults[state.currentTask] === null ? '⬜' : '❌');
    const itemEl = document.getElementById('check-item-' + i);
    if (itemEl) {
      itemEl.className = 'check-item' + (res ? ' pass' : ' fail');
    }
  });

  updatePills();
}

// =====================================================================
// SOLUTION VIEWER
// =====================================================================

function showSolution() {
  const task = tasks[state.currentTask];
  if (!task.solution) { alert('Ehhez a feladathoz nincs minta megoldás.'); return; }
  if (!confirm('Biztosan meg szeretnéd nézni a megoldást? A tanulás szempontjából jobb ha még egyszer próbálkozol! 😊')) return;
  state.editors.html.setValue(task.solution);
  if (task.solutionCss && state.editors.css) state.editors.css.setValue(task.solutionCss);
  document.getElementById('btn-solution').style.display = 'none';
  state.failedAttempts[state.currentTask] = 0;
}

// =====================================================================
// CONFETTI
// =====================================================================

function triggerConfetti() {
  const el = document.getElementById('confetti');
  el.classList.remove('animate');
  void el.offsetWidth; // reflow
  el.classList.add('animate');
  setTimeout(() => el.classList.remove('animate'), 800);
}

// =====================================================================
// REFERENCE PANEL
// =====================================================================

function buildRefPanel() {
  const body = document.getElementById('ref-body');
  body.innerHTML = '';
  refSections.forEach(sec => {
    const section = document.createElement('div');
    section.className = 'ref-section';

    const header = document.createElement('div');
    header.className = 'ref-section-header';
    header.innerHTML = '<span>' + sec.title + '</span><i class="fas fa-chevron-right chevron"></i>';
    header.onclick = () => section.classList.toggle('open');

    const secBody = document.createElement('div');
    secBody.className = 'ref-section-body';

    const code = document.createElement('div');
    code.className = 'ref-code';
    code.textContent = sec.code;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn-copy';
    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Másolás';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(sec.code).then(() => {
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Másolva!';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = '<i class="fas fa-copy"></i> Másolás';
        }, 1500);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = sec.code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Másolva!';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = '<i class="fas fa-copy"></i> Másolás';
        }, 1500);
      });
    };

    secBody.appendChild(code);
    secBody.appendChild(copyBtn);
    section.appendChild(header);
    section.appendChild(secBody);
    body.appendChild(section);
  });
}

function openRef() {
  document.getElementById('ref-panel').classList.add('open');
  document.getElementById('ref-overlay').classList.add('open');
}
function closeRef() {
  document.getElementById('ref-panel').classList.remove('open');
  document.getElementById('ref-overlay').classList.remove('open');
}

document.getElementById('btn-ref-toggle').addEventListener('click', () => {
  const panel = document.getElementById('ref-panel');
  if (panel.classList.contains('open')) closeRef();
  else openRef();
});
</script>
