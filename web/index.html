<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML/CSS Vizsga Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <img src="kandologo.png" alt="Kandó KSZKI" class="topbar-logo">
          <span id="student-info" class="student-info"></span>
          <button id="btn-logout" type="button" class="btn-logout" title="Kijelentkezés">⏏</button>
        </div>
        <div class="topbar-center">
          <select id="task-selector" class="task-selector">
            <option value="">-- Feladat --</option>
          </select>
          <button id="btn-task-desc" type="button" class="btn-sm" disabled title="Feladat leírás">Leírás</button>
          <button id="btn-sample-img" type="button" class="btn-sm" disabled title="Mintakép">Minta</button>
          <button id="btn-sources" type="button" class="btn-sm" disabled title="Források">Forrás</button>
        </div>
        <div class="topbar-right">
          <span id="timer" class="timer">60:00</span>
          <button id="btn-timer-toggle" type="button" class="btn-timer" title="Start/Stop">▶</button>
          <button id="btn-timer-reset" type="button" class="btn-timer" title="Reset">↺</button>
          <button id="btn-load-file" type="button" class="btn-sm" title="Betöltés">📂</button>
          <input type="file" id="file-input" accept=".json" hidden />
          <button id="btn-save-file" type="button" class="btn-sm btn-save" disabled title="Mentés">💾</button>
          <button id="btn-html-val-img" type="button" class="btn-sm" disabled title="HTML validálás képernyőkép feltöltése">HTML✓📷</button>
          <input type="file" id="html-validation-img" accept="image/*" hidden />
          <button id="btn-css-val-img" type="button" class="btn-sm" disabled title="CSS validálás képernyőkép feltöltése">CSS✓📷</button>
          <input type="file" id="css-validation-img" accept="image/*" hidden />
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="panel left">
        <div class="panel-header">
          <div class="editor-tabs">
            <button id="tab-html" type="button" class="editor-tab active">HTML</button>
            <button id="tab-css" type="button" class="editor-tab">CSS</button>
            <span class="tab-sep">│</span>
            <button id="btn-w3schools" type="button" class="editor-tab ref-tab" title="W3Schools">W3S</button>
            <button id="btn-html-validator" type="button" class="editor-tab ref-tab" title="HTML Validator">HTML✓</button>
            <button id="tab-css-validator" type="button" class="editor-tab ref-tab" title="CSS Validator">CSS✓</button>
          </div>
          <div class="actions">
            <button id="btn-wrap" type="button" title="Kijelölés becsomagolása tag-be">Wrap</button>
            <button id="btn-format" type="button" title="Kód formázása (Alt+Shift+F)">Kódformázó</button>
            <button id="btn-starter" type="button" disabled title="Kiindulás betöltése">⟲ Kiindulás</button>
            <button id="btn-blocks" type="button" class="is-active" title="Blokk nézet">Blokk</button>
            <button id="btn-interact" type="button" class="is-active" title="Interakció">Inter.</button>
          </div>
        </div>

        <div class="editor-container">
          <div id="html-editor-wrapper" class="editor-pane active">
            <div id="html-editor" class="editor" aria-label="HTML editor"></div>
          </div>
          <div id="css-editor-wrapper" class="editor-pane">
            <div id="css-editor" class="editor" aria-label="CSS editor"></div>
          </div>
        </div>

        <section class="tasks" id="tasks-section">
          <div class="tasks-header">
            <span>Feladatok <button id="btn-toggle-tasks" type="button" class="btn-toggle-tasks" title="Összecsuk/Kinyit">▼</button></span>
            <span id="progress-text" class="progress-text">0/0 (0%)</span>
          </div>
          <div id="tasks-content" class="tasks-content">
            <div class="progress-bar-bg">
              <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
            <ul id="task-list" class="task-list"></ul>
          </div>
        </section>
      </section>

      <section class="panel right">
        <div class="panel-header">
          <h2>Előnézet</h2>
          <div class="preview-actions">
            <button id="btn-preview-new-tab" type="button" class="btn-sm" disabled title="Új lapon">↗</button>
            <span class="status" id="status">Válassz feladatot…</span>
          </div>
        </div>
        <iframe id="preview" title="Preview" sandbox="allow-scripts allow-same-origin"></iframe>
      </section>
    </main>

    <footer class="footer">
      <kbd>Tab</kbd> Emmet | Automatikus mentés
    </footer>

    <!-- Tanuló adatai modal -->
    <div id="student-modal" class="student-modal-overlay">
      <div class="student-modal">
        <div style="text-align:center; margin-bottom: 1rem;">
          <img src="kandologo.png" alt="Kandó KSZKI" class="modal-logo">
        </div>
        <h2>Vizsga kezdése</h2>
        <p>Add meg az adataidat:</p>
        <form id="student-form">
          <div class="form-group">
            <label for="student-name">Név:</label>
            <input type="text" id="student-name" placeholder="Vezetéknév Keresztnév" required />
          </div>
          <div class="form-group">
            <label for="student-email">Email:</label>
            <div class="email-input-wrapper">
              <input type="text" id="student-email" placeholder="felhasználónév" required />
              <span class="email-domain">@kkszki.hu</span>
            </div>
          </div>
          <div class="form-group">
            <label>Osztály:</label>
            <div class="class-selector-wrapper">
              <select id="student-class-year" class="class-select" required>
                <option value="">Évf.</option>
                <option value="9">9.</option>
                <option value="10">10.</option>
              </select>
              <select id="student-class-letter" class="class-select" required>
                <option value="">Oszt.</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="K">K</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-start-exam">Kezdés</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emmet-monaco-es/dist/emmet-monaco.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
