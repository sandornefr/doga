<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML/CSS Vizsga Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <img src="kandologo2.png" alt="Kandó KSZKI" class="topbar-logo">
          <span id="student-info" class="student-info"></span>
          <button id="btn-logout" type="button" class="btn-logout" title="Kijelentkezés">⏏</button>
        </div>
        <div class="topbar-center">
          <select id="task-selector" class="task-selector">
            <option value="">-- Feladat --</option>
          </select>
        </div>
        <div class="topbar-right">
          <span id="timer" class="timer">60:00</span>
          <button id="btn-timer-toggle" type="button" class="btn-timer" title="Start/Stop">▶</button>
          <button id="btn-timer-reset" type="button" class="btn-timer" title="Reset">↺</button>
          <button id="btn-load-file" type="button" class="btn-sm" title="Betöltés">📂</button>
          <input type="file" id="file-input" accept=".json" hidden />
          <button id="btn-save-file" type="button" class="btn-sm btn-save" disabled title="Mentés">💾</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <!-- BAL: Feladatleírás + pontszámláló -->
      <section class="panel desc-panel">
        <div class="panel-header">
          <h2>Feladatleírás</h2>
          <button id="btn-sources" type="button" class="btn-sm" disabled title="Forrás szövegek">Forrás</button>
        </div>
        <iframe id="task-desc-frame" class="desc-frame" title="Feladatleírás" sandbox="allow-same-origin allow-scripts"></iframe>
        <div class="score-box">
          <div class="score-display">
            <span id="score-current">0</span><span class="score-sep"> / </span><span id="score-total">40</span>
            <span class="score-label">pont</span>
          </div>
          <div class="progress-bar-bg">
            <div id="progress-bar" class="progress-bar-fill"></div>
          </div>
        </div>
      </section>

      <!-- JOBB: Szerkesztő -->
      <section class="panel editor-panel">
        <div class="panel-header">
          <div class="editor-tabs">
            <button id="tab-html" type="button" class="editor-tab active">HTML</button>
            <button id="tab-css" type="button" class="editor-tab">CSS</button>
            <span class="tab-sep">│</span>
            <button id="btn-w3schools" type="button" class="editor-tab ref-tab" title="W3Schools">W3S</button>
            <button id="btn-html-validator" type="button" class="editor-tab ref-tab" title="HTML Validator">HTML✓</button>
            <button id="tab-css-validator" type="button" class="editor-tab ref-tab" title="CSS Validator">CSS✓</button>
          </div>
          <div class="actions">
            <button id="btn-preview-new-tab" type="button" class="btn-sm btn-preview" disabled title="Előnézet új lapon">↗ Előnézet</button>
            <button id="btn-wrap" type="button" title="Kijelölés becsomagolása tag-be">Wrap</button>
            <button id="btn-format" type="button" title="Kód formázása">Formáz</button>
            <button id="btn-starter" type="button" disabled title="Kiindulás betöltése">⟲ Kiindulás</button>
            <button id="btn-theme-toggle" type="button" class="btn-sm" title="Sötét / Világos mód">🌙</button>
            <span class="status" id="status">Válassz feladatot…</span>
          </div>
        </div>
        <div class="editor-container">
          <div id="html-editor-wrapper" class="editor-pane active">
            <div id="html-editor" class="editor" aria-label="HTML editor"></div>
          </div>
          <div id="css-editor-wrapper" class="editor-pane">
            <div id="css-editor" class="editor" aria-label="CSS editor"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <kbd>Tab</kbd> Emmet | Automatikus mentés
    </footer>

    <!-- Tanuló adatai modal -->
    <div id="student-modal" class="student-modal-overlay">
      <div class="student-modal">
        <div style="text-align:center; margin-bottom: 1rem;">
          <img src="kandologo2.png" alt="Kandó KSZKI" class="modal-logo">
        </div>
        <h2>Vizsga kezdése</h2>
        <p>Add meg az adataidat:</p>
        <form id="student-form">
          <div class="form-group">
            <label for="student-name">Név:</label>
            <input type="text" id="student-name" placeholder="Vezetéknév Keresztnév" required />
          </div>
          <div class="form-group">
            <label for="student-email">Email:</label>
            <div class="email-input-wrapper">
              <input type="text" id="student-email" placeholder="felhasználónév" required />
              <span class="email-domain">@kkszki.hu</span>
            </div>
          </div>
          <div class="form-group">
            <label>Osztály:</label>
            <div class="class-selector-wrapper">
              <select id="student-class-year" class="class-select" required>
                <option value="">Évf.</option>
                <option value="9">9.</option>
                <option value="10">10.</option>
              </select>
              <select id="student-class-letter" class="class-select" required>
                <option value="">Oszt.</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="K">K</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-start-exam">Kezdés</button>
        </form>
      </div>
    </div>

    <!-- Referencia / Validátor drawer -->
    <div id="ref-drawer" class="ref-drawer">
      <div class="ref-drawer-header">
        <span id="ref-drawer-title"></span>
        <div class="ref-drawer-actions">
          <button id="ref-drawer-copy-code" class="btn-sm ref-copy-btn" style="display:none" title="Kód másolása vágólapra">📋 Kód másolása</button>
          <button id="ref-drawer-screenshot" class="btn-sm ref-screenshot-btn" style="display:none" title="Képernyőkép a vágólapról mentése (Win+Shift+S → kattints ide)">📷 Kép mentése</button>
          <button id="ref-drawer-open-popup" class="btn-sm ref-extlink-btn" title="Megnyitás popup ablakban">↗ Megnyitás</button>
          <button id="ref-drawer-close" class="btn-sm ref-close-btn" title="Bezárás">✕</button>
        </div>
      </div>
      <div id="ref-drawer-screenshot-status" class="ref-screenshot-status" style="display:none"></div>
      <!-- Validator panel: lépések + kód előnézet -->
      <div id="ref-drawer-body" class="ref-drawer-body">
        <div id="ref-drawer-steps" class="ref-steps-box" style="display:none">
          <p class="ref-steps-title" id="ref-steps-title"></p>
          <ol class="ref-steps-list" id="ref-steps-list"></ol>
        </div>
        <textarea id="ref-code-preview" class="ref-code-preview" readonly spellcheck="false" style="display:none"></textarea>
      </div>
    </div>
    <div id="ref-drawer-backdrop" class="ref-drawer-backdrop"></div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emmet-monaco-es/dist/emmet-monaco.min.js"></script>
    <script src="app.js?v=6"></script>
  </body>
</html>
